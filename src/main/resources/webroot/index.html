<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Web Framework Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Web Framework Demo</h1>
    <p>Static file served from <code>webroot</code>.</p>
    <ul>
        <li><a href="/">/</a> — Greetings from Spring Boot!</li>
        <li><a href="/hello">/hello</a> — FirstWebService (reflection)</li>
        <li><a href="/greeting">/greeting</a> — GreetingController (default: Hola World)</li>
        <li><a href="/greeting?name=YourName">/greeting?name=YourName</a> — GreetingController with @RequestParam</li>
    </ul>
</body>
</html>
